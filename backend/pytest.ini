[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short

markers =
    slow: Slow running tests
