services:
  # Base de datos PostgreSQL con extensión pgvector (relacional + vectorial)
  db:
    build:
      context: ..
      dockerfile: docker/db/Dockerfile.dev
    container_name: zenith_db_prod
    restart: always
    env_file:
      - .env.prod
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./db/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - zenith_prod_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "com.zenith.environment=production"
      - "com.zenith.service=database"

  # Backend FastAPI
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile.prod
    container_name: zenith_backend_prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      # Volumen persistente para almacenamiento físico de archivos (Drive)
      - zenith_storage_prod:/app/storage
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - zenith_prod_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.zenith.environment=production"
      - "com.zenith.service=backend"

  # Frontend Nginx + React
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.prod
    container_name: zenith_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - zenith_prod_network
    labels:
      - "com.zenith.environment=production"
      - "com.zenith.service=frontend"

# Red personalizada
networks:
  zenith_prod_network:
    driver: bridge
    name: zenith_prod_network

# Volúmenes persistentes
volumes:
  postgres_data_prod:
    name: zenith_prod_postgres_data
  zenith_storage_prod:
    name: zenith_prod_storage
