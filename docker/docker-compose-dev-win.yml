services:
  # Base de datos PostgreSQL
  db:
    build:
      context: ./db
      dockerfile: Dockerfile.dev
    container_name: devarena_db
    restart: unless-stopped
    env_file:
      - ../backend/.env.dev
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - devarena_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "com.devarena.environment=development"
      - "com.devarena.service=database"

  # Backend FastAPI
  backend:
    build:
      # Contexto en la raíz para que vea la carpeta 'backend' y 'docker'
      context: ..
      dockerfile: docker/backend/Dockerfile.dev
    container_name: devarena_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.dev
    volumes:
      # Sincroniza el código fuente
      - ../backend:/app
      # Protege las dependencias internas del contenedor
      - /app/.venv
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Crucial para evitar el ModuleNotFoundError
      - PYTHONPATH=/app
    # Comando explícito para asegurar host 0.0.0.0 y hot-reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devarena_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.devarena.environment=development"
      - "com.devarena.service=backend"

networks:
  devarena_network:
    driver: bridge
    name: devarena_dev_network

volumes:
  postgres_data:
    name: devarena_dev_postgres_data
  # Volumen anónimo para la caché de dependencias
  backend_cache:
    name: devarena_dev_backend_cache