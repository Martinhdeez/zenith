services:
  # Base de datos PostgreSQL (datos relacionales: usuarios, metadatos, etc.)
  db:
    build:
      context: ./db
      dockerfile: Dockerfile.dev
    container_name: zenith_db
    restart: unless-stopped
    env_file:
      - ../backend/.env.dev
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - zenith_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "com.zenith.environment=development"
      - "com.zenith.service=database"

  # Base de datos vectorial Qdrant (búsqueda AI de archivos)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zenith_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - zenith_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "com.zenith.environment=development"
      - "com.zenith.service=vector-db"

  # Backend FastAPI
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile.dev
    container_name: zenith_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.dev
    volumes:
      # Hot-reload: sincroniza cambios de código en tiempo real
      - ../backend:/app
      # Evitar sobrescribir las dependencias instaladas en el contenedor
      - backend_cache:/app/.venv
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - zenith_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.zenith.environment=development"
      - "com.zenith.service=backend"

# Red personalizada para aislamiento
networks:
  zenith_network:
    driver: bridge
    name: zenith_dev_network

# Volúmenes persistentes
volumes:
  postgres_data:
    name: zenith_dev_postgres_data
  qdrant_data:
    name: zenith_dev_qdrant_data
  backend_cache:
    name: zenith_dev_backend_cache